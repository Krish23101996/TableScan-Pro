<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableScan Pro - Intelligent Table Extraction</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0A0A0F 0%, #1a1f3a 100%);
            color: #F1F5F9;
        }

        @keyframes conic-gradient-rotate {
            0% { --tw-gradient-stops: conic(#6366F1 0deg, #22D3EE 90deg, transparent 180deg); }
            100% { --tw-gradient-stops: conic(transparent 0deg, #6366F1 90deg, #22D3EE 180deg); }
        }

        .upload-zone-border {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .upload-zone-border.glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5), 0 0 40px rgba(34, 211, 238, 0.3);
        }

        .pulsing-ring {
            animation: pulse-ring 1.5s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            }
            70% {
                box-shadow: 0 0 0 30px rgba(99, 102, 241, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
            }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent 0%, rgba(34, 211, 238, 0.2) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer-animation 2s infinite;
        }

        @keyframes shimmer-animation {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-state-svg {
            width: 200px;
            height: 200px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // Set PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        function TableScanPro() {
            const [file, setFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [processingStep, setProcessingStep] = useState(0);
            const [tables, setTables] = useState([]);
            const [selectedTableIds, setSelectedTableIds] = useState(new Set());
            const [isDragActive, setIsDragActive] = useState(false);
            const fileInputRef = useRef(null);
            const toastTimeoutRef = useRef(null);
            const [toast, setToast] = useState(null);

            const showToast = useCallback((message, type = 'error') => {
                if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
                setToast({ message, type });
                toastTimeoutRef.current = setTimeout(() => setToast(null), 4000);
            }, []);

            const formatFileSize = (bytes) => {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            };

            const processPDF = useCallback(async (arrayBuffer) => {
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const detectedTables = [];

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const text = await page.getTextContent();
                    const items = text.items;

                    if (items.length > 0) {
                        const rows = {};
                        items.forEach(item => {
                            const y = Math.round(item.y);
                            if (!rows[y]) rows[y] = [];
                            rows[y].push(item.str);
                        });

                        const sortedRows = Object.keys(rows).sort((a, b) => b - a).slice(0, 10);
                        if (sortedRows.length > 0) {
                            const tableData = sortedRows.map(y => rows[y]);
                            detectedTables.push({
                                id: detectedTables.length,
                                name: `Table ${detectedTables.length + 1}`,
                                data: tableData,
                                source: `PDF - Page ${pageNum}`
                            });
                        }
                    }
                }

                if (detectedTables.length === 0) {
                    detectedTables.push({
                        id: 0,
                        name: 'Text Content',
                        data: [['Content from PDF']],
                        source: 'PDF'
                    });
                }

                return detectedTables;
            }, []);

            const processExcel = useCallback((arrayBuffer) => {
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const detectedTables = [];

                workbook.SheetNames.forEach((sheetName, idx) => {
                    const worksheet = workbook.Sheets[sheetName];
                    const data = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    if (data.length > 0) {
                        detectedTables.push({
                            id: detectedTables.length,
                            name: sheetName || `Sheet ${idx + 1}`,
                            data: data,
                            source: 'Excel'
                        });
                    }
                });

                return detectedTables;
            }, []);

            const handleFile = useCallback(async (selectedFile) => {
                const validTypes = [
                    'application/pdf',
                    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                    'application/vnd.ms-excel'
                ];

                if (!validTypes.includes(selectedFile.type)) {
                    showToast('Only PDF, XLSX, and XLS files are supported', 'error');
                    return;
                }

                if (selectedFile.size > 10 * 1024 * 1024) {
                    showToast('File size must be less than 10MB', 'error');
                    return;
                }

                setFile(selectedFile);
                setIsProcessing(true);
                setProcessingStep(1);
                setSelectedTableIds(new Set());

                try {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    setProcessingStep(2);

                    const arrayBuffer = await selectedFile.arrayBuffer();

                    let detectedTables = [];
                    if (selectedFile.type === 'application/pdf') {
                        detectedTables = await processPDF(arrayBuffer);
                    } else {
                        detectedTables = processExcel(arrayBuffer);
                    }

                    setProcessingStep(3);
                    await new Promise(resolve => setTimeout(resolve, 800));

                    if (detectedTables.length === 0) {
                        showToast('No tables detected in this file', 'error');
                        setTables([]);
                    } else {
                        setTables(detectedTables);
                        showToast(`Found ${detectedTables.length} table(s)`, 'success');
                    }
                } catch (error) {
                    console.error('Error processing file:', error);
                    showToast('Failed to process file. Please try another file.', 'error');
                    setTables([]);
                } finally {
                    setIsProcessing(false);
                }
            }, [processPDF, processExcel, showToast]);

            const handleDrag = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') {
                    setIsDragActive(true);
                } else if (e.type === 'dragleave') {
                    setIsDragActive(false);
                }
            }, []);

            const handleDrop = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragActive(false);

                const files = e.dataTransfer.files;
                if (files && files[0]) {
                    handleFile(files[0]);
                }
            }, [handleFile]);

            const toggleTableSelection = useCallback((tableId) => {
                const newSelection = new Set(selectedTableIds);
                if (newSelection.has(tableId)) {
                    newSelection.delete(tableId);
                } else {
                    newSelection.add(tableId);
                }
                setSelectedTableIds(newSelection);
            }, [selectedTableIds]);

            const handleExport = useCallback(() => {
                if (selectedTableIds.size === 0) {
                    showToast('Please select at least one table to export', 'error');
                    return;
                }

                try {
                    const selectedTables = tables.filter(t => selectedTableIds.has(t.id));
                    const wb = XLSX.utils.book_new();

                    selectedTables.forEach(table => {
                        const ws = XLSX.utils.aoa_to_sheet(table.data);
                        XLSX.utils.book_append_sheet(wb, ws, table.name.slice(0, 31));
                    });

                    const fileName = selectedTables.length === 1 
                        ? `${selectedTables[0].name}.xlsx`
                        : 'TableScan_Export.xlsx';

                    XLSX.writeFile(wb, fileName);
                    showToast(`✓ Exported ${selectedTables.length} table(s)`, 'success');
                } catch (error) {
                    console.error('Export error:', error);
                    showToast('Failed to export tables', 'error');
                }
            }, [selectedTableIds, tables, showToast]);

            return (
                <div className="min-h-screen bg-gradient-to-br from-[#0A0A0F] via-[#0F172A] to-[#1a1f3a]">
                    {/* Hero Upload Section */}
                    <section className="px-4 py-16 sm:py-24">
                        <div className="max-w-4xl mx-auto">
                            <div className="text-center mb-12">
                                <h1 className="text-4xl sm:text-5xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-indigo-500 bg-clip-text text-transparent">
                                    Drop your file.
                                </h1>
                                <h1 className="text-4xl sm:text-5xl md:text-6xl font-bold mb-6 bg-gradient-to-r from-indigo-500 to-cyan-400 bg-clip-text text-transparent">
                                    Extract your table.
                                </h1>
                                <p className="text-lg text-slate-400 max-w-2xl mx-auto">
                                    Upload a PDF or Excel file and instantly extract clean, organized tables
                                </p>
                            </div>

                            {/* Upload Zone */}
                            <div
                                className={`relative border-2 border-dashed rounded-2xl p-12 sm:p-16 text-center transition-all duration-300 ${
                                    isDragActive
                                        ? 'border-indigo-500 bg-indigo-500/10 glow'
                                        : 'border-indigo-500/40 bg-indigo-500/5'
                                }`}
                                onDragEnter={handleDrag}
                                onDragLeave={handleDrag}
                                onDragOver={handleDrag}
                                onDrop={handleDrop}
                            >
                                <input
                                    ref={fileInputRef}
                                    type="file"
                                    accept=".pdf,.xlsx,.xls"
                                    onChange={(e) => e.target.files?.[0] && handleFile(e.target.files[0])}
                                    className="hidden"
                                />

                                {!isProcessing && (
                                    <div className="cursor-pointer" onClick={() => fileInputRef.current?.click()}>
                                        <div className="text-6xl mb-6 inline-block">📄</div>
                                        <h2 className="text-2xl font-semibold text-slate-100 mb-2">
                                            {file ? file.name : 'Choose or drag your file'}
                                        </h2>
                                        {file && (
                                            <p className="text-sm text-cyan-400 mb-4">
                                                {formatFileSize(file.size)}
                                            </p>
                                        )}
                                        <p className="text-slate-400">
                                            {file ? 'Click to replace' : 'Click to browse or drag and drop'}
                                        </p>
                                        <div className="flex justify-center gap-2 mt-6 flex-wrap">
                                            <span className="px-4 py-2 bg-indigo-500/20 border border-indigo-500/30 rounded-full text-sm text-indigo-300">
                                                PDF
                                            </span>
                                            <span className="px-4 py-2 bg-indigo-500/20 border border-indigo-500/30 rounded-full text-sm text-indigo-300">
                                                XLSX
                                            </span>
                                            <span className="px-4 py-2 bg-indigo-500/20 border border-indigo-500/30 rounded-full text-sm text-indigo-300">
                                                XLS
                                            </span>
                                        </div>
                                    </div>
                                )}

                                {isProcessing && (
                                    <div className="py-8">
                                        <div className="inline-block mb-6 pulsing-ring w-16 h-16 rounded-full border-4 border-indigo-500/20 border-t-indigo-500"></div>
                                        <p className="text-lg font-medium text-slate-200 mb-8">Processing your file...</p>
                                        
                                        {/* Progress Bar */}
                                        <div className="w-full bg-slate-700/30 rounded-full h-2 mb-6 overflow-hidden">
                                            <div
                                                className="bg-gradient-to-r from-indigo-500 to-cyan-400 h-full rounded-full"
                                                style={{
                                                    width: `${(processingStep / 3) * 100}%`,
                                                    animation: 'none',
                                                    transition: 'width 0.5s ease'
                                                }}
                                            ></div>
                                        </div>

                                        {/* Progress Steps */}
                                        <div className="space-y-2 text-sm">
                                            <p className={`transition-colors ${processingStep >= 1 ? 'text-cyan-400 font-semibold' : 'text-slate-400'}`}>
                                                ✓ Reading file
                                            </p>
                                            <p className={`transition-colors ${processingStep >= 2 ? 'text-cyan-400 font-semibold' : 'text-slate-400'}`}>
                                                {processingStep >= 2 ? '✓' : '○'} Detecting tables
                                            </p>
                                            <p className={`transition-colors ${processingStep >= 3 ? 'text-cyan-400 font-semibold' : 'text-slate-400'}`}>
                                                {processingStep >= 3 ? '✓' : '○'} Rendering preview
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* Table Preview Section */}
                    {tables.length > 0 && !isProcessing && (
                        <section className="px-4 py-12 sm:py-16">
                            <div className="max-w-6xl mx-auto">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-bold text-slate-100 mb-2">Detected Tables</h2>
                                    <p className="text-slate-400">
                                        Found {tables.length} table{tables.length !== 1 ? 's' : ''} • 
                                        {selectedTableIds.size > 0 && <span className="text-cyan-400 ml-2">{selectedTableIds.size} selected</span>}
                                    </p>
                                </div>

                                {/* Empty State */}
                                {tables.length === 0 && (
                                    <div className="text-center py-16">
                                        <div className="text-6xl mb-6 opacity-30">📊</div>
                                        <h3 className="text-xl font-semibold text-slate-300 mb-2">No tables detected</h3>
                                        <p className="text-slate-400">
                                            Try uploading a file that contains structured table data
                                        </p>
                                    </div>
                                )}

                                {/* Tables Grid */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {tables.map((table, idx) => (
                                        <div
                                            key={table.id}
                                            onClick={() => toggleTableSelection(table.id)}
                                            className={`group relative bg-white/4 backdrop-blur-md border rounded-lg p-5 cursor-pointer transition-all duration-300 transform hover:scale-[1.02] ${
                                                selectedTableIds.has(table.id)
                                                    ? 'border-indigo-500/80 bg-indigo-500/10 shadow-lg shadow-indigo-500/20'
                                                    : 'border-white/8 hover:border-white/20'
                                            }`}
                                            style={{
                                                animation: `slideUp 0.5s ease-out ${idx * 0.05}s backwards`
                                            }}
                                        >
                                            {/* Checkbox */}
                                            <div className="absolute top-4 right-4 z-10">
                                                <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all ${
                                                    selectedTableIds.has(table.id)
                                                        ? 'bg-indigo-500 border-indigo-500'
                                                        : 'border-slate-500'
                                                }`}>
                                                    {selectedTableIds.has(table.id) && (
                                                        <span className="text-white text-xs font-bold">✓</span>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Header */}
                                            <div className="mb-4 pr-8">
                                                <h3 className="font-semibold text-slate-100 mb-2">{table.name}</h3>
                                                <div className="flex gap-2">
                                                    <span className="px-2 py-1 text-xs bg-slate-700/50 text-slate-300 rounded border border-slate-600/50">
                                                        {table.data.length} rows
                                                    </span>
                                                    <span className="px-2 py-1 text-xs bg-slate-700/50 text-slate-300 rounded border border-slate-600/50">
                                                        {table.data[0]?.length || 0} cols
                                                    </span>
                                                </div>
                                            </div>

                                            {/* Preview Table */}
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-xs">
                                                    <thead>
                                                        <tr className="border-b border-slate-600/50">
                                                            {table.data[0]?.slice(0, 5).map((cell, i) => (
                                                                <th
                                                                    key={i}
                                                                    className="px-2 py-2 text-left font-semibold text-cyan-400 text-ellipsis whitespace-nowrap overflow-hidden"
                                                                >
                                                                    {String(cell || '')}
                                                                </th>
                                                            ))}
                                                            {table.data[0]?.length > 5 && (
                                                                <th className="px-2 py-2 text-left font-semibold text-cyan-400">...</th>
                                                            )}
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {table.data.slice(1, 5).map((row, i) => (
                                                            <tr key={i} className="border-b border-slate-700/30 hover:bg-slate-700/20">
                                                                {row.slice(0, 5).map((cell, j) => (
                                                                    <td
                                                                        key={j}
                                                                        className="px-2 py-2 text-slate-300 text-ellipsis whitespace-nowrap overflow-hidden"
                                                                    >
                                                                        {String(cell || '')}
                                                                    </td>
                                                                ))}
                                                                {row.length > 5 && (
                                                                    <td className="px-2 py-2 text-slate-400">...</td>
                                                                )}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>

                                            {table.data.length > 5 && (
                                                <p className="text-xs text-slate-400 mt-2 italic">
                                                    ... and {table.data.length - 5} more rows
                                                </p>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>
                    )}

                    {/* Sticky Export Bar */}
                    {tables.length > 0 && selectedTableIds.size > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-[#0A0A0F] to-[#0A0A0F]/80 backdrop-blur-md border-t border-white/5 px-4 py-4 sm:py-6">
                            <div className="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                                <p className="text-sm text-slate-300">
                                    <span className="font-semibold text-cyan-400">{selectedTableIds.size}</span> table{selectedTableIds.size !== 1 ? 's' : ''} selected
                                </p>
                                <button
                                    onClick={handleExport}
                                    className="w-full sm:w-auto px-6 py-3 bg-gradient-to-r from-indigo-500 to-cyan-400 text-white font-semibold rounded-xl hover:scale-105 active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2 shadow-lg hover:shadow-xl hover:shadow-indigo-500/50"
                                >
                                    <span>📥</span>
                                    <span>Export to Excel</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Toast Notifications */}
                    {toast && (
                        <div className="fixed top-6 right-6 max-w-sm">
                            <div className={`px-4 py-3 rounded-lg border backdrop-blur-md ${
                                toast.type === 'success'
                                    ? 'bg-green-500/20 border-green-500/50 text-green-300'
                                    : 'bg-red-500/20 border-red-500/50 text-red-300'
                            }`}>
                                {toast.message}
                            </div>
                        </div>
                    )}

                    {/* Padding for export bar */}
                    {tables.length > 0 && selectedTableIds.size > 0 && <div className="h-24"></div>}

                    <style>{`
                        @keyframes slideUp {
                            from {
                                opacity: 0;
                                transform: translateY(20px);
                            }
                            to {
                                opacity: 1;
                                transform: translateY(0);
                            }
                        }
                    `}</style>
                </div>
            );
        }

        ReactDOM.render(<TableScanPro />, document.getElementById('root'));
    </script>
</body>
</html>
