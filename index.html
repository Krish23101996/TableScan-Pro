<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableScan Pro - Extract Tables from PDFs & Excel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0F172A;
            --indigo: #6366F1;
            --cyan: #22D3EE;
            --light-navy: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeIn 0.8s ease-out;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--indigo) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* Upload Zone */
        .upload-zone {
            position: relative;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.2s backwards;
        }

        .upload-box {
            border: 2px dashed var(--indigo);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            background: rgba(99, 102, 241, 0.03);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(34, 211, 238, 0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .upload-box:hover,
        .upload-box.dragover {
            border-color: var(--cyan);
            background: rgba(34, 211, 238, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(34, 211, 238, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .upload-text h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .upload-text p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .upload-text .formats {
            font-size: 0.85rem;
            color: var(--cyan);
            margin-top: 8px;
        }

        .file-input {
            display: none;
        }

        .file-info {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(34, 211, 238, 0.1);
            border-left: 3px solid var(--cyan);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-info.show {
            display: block;
        }

        /* Processing State */
        .processing {
            display: none;
            text-align: center;
            padding: 40px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            margin-bottom: 40px;
        }

        .processing.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .progress-container {
            margin: 24px 0;
        }

        .progress-bar {
            height: 6px;
            background: rgba(34, 211, 238, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--indigo), var(--cyan));
            width: 0%;
            animation: loading 2s ease-in-out infinite;
            border-radius: 3px;
        }

        @keyframes loading {
            0%, 100% { width: 10%; }
            50% { width: 70%; }
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-step.active {
            color: var(--cyan);
            font-weight: 600;
        }

        .progress-step::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            display: inline-block;
        }

        /* Results Grid */
        .results-container {
            display: none;
            margin-top: 40px;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        .results-header {
            margin-bottom: 24px;
        }

        .results-header h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .results-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .tables-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Table Card */
        .table-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table-card:hover {
            transform: translateY(-4px);
            border-color: var(--cyan);
            box-shadow: 0 8px 32px rgba(34, 211, 238, 0.15);
            background: rgba(30, 41, 59, 0.7);
        }

        .table-card.selected {
            border-color: var(--indigo);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
        }

        .table-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .table-card:hover::before {
            opacity: 1;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .table-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .table-badge {
            display: flex;
            gap: 8px;
        }

        .badge {
            background: rgba(99, 102, 241, 0.2);
            color: var(--cyan);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid rgba(34, 211, 238, 0.3);
        }

        .table-preview {
            overflow-x: auto;
            position: relative;
            z-index: 1;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .preview-table thead {
            border-bottom: 1px solid rgba(34, 211, 238, 0.3);
        }

        .preview-table th {
            text-align: left;
            padding: 8px 0;
            color: var(--cyan);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .preview-table td {
            padding: 6px 0;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .preview-table tbody tr:hover {
            background: rgba(34, 211, 238, 0.05);
        }

        .preview-table tbody tr:not(:last-child) {
            border-bottom: 1px solid rgba(34, 211, 238, 0.1);
        }

        .select-checkbox {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--indigo);
            z-index: 2;
        }

        /* Export Button */
        .export-button-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: none;
            animation: slideUp 0.4s ease;
            z-index: 100;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .export-button-container.show {
            display: block;
        }

        .export-button {
            background: linear-gradient(135deg, var(--indigo) 0%, var(--cyan) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .export-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.4);
        }

        .export-button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .export-button-container {
                bottom: 20px;
                right: 20px;
            }

            .export-button {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 25%, rgba(34, 211, 238, 0.1) 50%, rgba(99, 102, 241, 0.1) 75%);
            background-size: 200% 100%;
            animation: loading-skeleton 1.5s infinite;
        }

        @keyframes loading-skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-left: 3px solid #EF4444;
            color: #FECACA;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-left: 3px solid var(--cyan);
            color: var(--cyan);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            .header {
                margin-bottom: 40px;
            }

            .upload-box {
                padding: 40px 24px;
            }

            .upload-icon {
                font-size: 2rem;
            }

            .tables-grid {
                gap: 16px;
            }

            .table-card {
                padding: 16px;
            }

            .progress-steps {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TableScan Pro</h1>
            <p>Drop your file. Get your table.</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <div class="upload-zone">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📄</div>
                <div class="upload-text">
                    <h2>Upload Your File</h2>
                    <p>Click to browse or drag and drop</p>
                    <div class="formats">Supports: PDF, XLSX, XLS</div>
                </div>
                <div class="file-info" id="fileInfo"></div>
            </div>
            <input type="file" id="fileInput" class="file-input" accept=".pdf,.xlsx,.xls">
        </div>

        <div class="processing" id="processing">
            <p style="font-size: 1.1rem; font-weight: 500; margin-bottom: 24px;">Processing your file...</p>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-steps">
                    <div class="progress-step active" data-step="1">Reading file</div>
                    <div class="progress-step" data-step="2">Detecting tables</div>
                    <div class="progress-step" data-step="3">Rendering preview</div>
                </div>
            </div>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="results-header">
                <h2>Detected Tables</h2>
                <p id="tableCount">Select tables to export</p>
            </div>
            <div class="tables-grid" id="tablesGrid"></div>
        </div>
    </div>

    <div class="export-button-container" id="exportContainer">
        <button class="export-button" id="exportButton">
            <span>📥</span>
            <span>Export Selected</span>
        </button>
    </div>

    <script>
        // Set PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let detectedTables = [];
        let selectedTables = new Set();
        let currentFile = null;

        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const processing = document.getElementById('processing');
        const resultsContainer = document.getElementById('resultsContainer');
        const tablesGrid = document.getElementById('tablesGrid');
        const exportContainer = document.getElementById('exportContainer');
        const exportButton = document.getElementById('exportButton');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const tableCount = document.getElementById('tableCount');

        // Upload zone events
        uploadBox.addEventListener('click', () => fileInput.click());
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });
        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });
        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const validTypes = ['application/pdf', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'application/vnd.ms-excel'];
            
            if (!validTypes.includes(file.type)) {
                showError('Please upload a valid PDF or Excel file');
                return;
            }

            currentFile = file;
            fileInfo.textContent = `📎 ${file.name} (${formatFileSize(file.size)})`;
            fileInfo.classList.add('show');

            setTimeout(() => {
                processFile(file);
            }, 500);
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 5000);
        }

        function updateProgress(step) {
            document.querySelectorAll('.progress-step').forEach((el, idx) => {
                el.classList.toggle('active', idx < step);
            });
        }

        async function processFile(file) {
            detectedTables = [];
            selectedTables.clear();
            processing.classList.add('show');
            resultsContainer.classList.remove('show');
            exportContainer.classList.remove('show');

            try {
                updateProgress(1);
                await new Promise(resolve => setTimeout(resolve, 500));

                const arrayBuffer = await file.arrayBuffer();
                updateProgress(2);

                if (file.type === 'application/pdf') {
                    await processPDF(arrayBuffer);
                } else {
                    await processExcel(arrayBuffer);
                }

                updateProgress(3);
                await new Promise(resolve => setTimeout(resolve, 800));

                displayTables();
            } catch (err) {
                console.error('Error processing file:', err);
                showError('Failed to process file. Please try another file.');
            } finally {
                processing.classList.remove('show');
            }
        }

        async function processPDF(arrayBuffer) {
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const text = await page.getTextContent();
                
                // Simple table detection: group text items by vertical position
                const items = text.items;
                if (items.length > 0) {
                    const rows = {};
                    items.forEach(item => {
                        const y = Math.round(item.y);
                        if (!rows[y]) rows[y] = [];
                        rows[y].push(item.str);
                    });

                    const sortedRows = Object.keys(rows).sort((a, b) => b - a).slice(0, 10);
                    if (sortedRows.length > 0) {
                        const tableData = sortedRows.map(y => rows[y]);
                        detectedTables.push({
                            id: detectedTables.length,
                            name: `Table ${detectedTables.length + 1}`,
                            data: tableData,
                            source: `PDF - Page ${pageNum}`
                        });
                    }
                }
            }

            // If no tables detected, create a simple one from text
            if (detectedTables.length === 0) {
                detectedTables.push({
                    id: 0,
                    name: 'Text Content',
                    data: [['Content from PDF']],
                    source: 'PDF'
                });
            }
        }

        async function processExcel(arrayBuffer) {
            const workbook = XLSX.read(arrayBuffer, { type: 'array' });
            
            workbook.SheetNames.forEach((sheetName, idx) => {
                const worksheet = workbook.Sheets[sheetName];
                const data = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (data.length > 0) {
                    detectedTables.push({
                        id: detectedTables.length,
                        name: sheetName || `Sheet ${idx + 1}`,
                        data: data,
                        source: 'Excel'
                    });
                }
            });
        }

        function displayTables() {
            tablesGrid.innerHTML = '';
            selectedTables.clear();

            detectedTables.forEach((table, idx) => {
                const card = document.createElement('div');
                card.className = 'table-card';
                card.dataset.tableId = table.id;

                const rows = table.data.slice(0, 5);
                const rowCount = table.data.length;
                const colCount = table.data[0]?.length || 0;

                let tableHTML = '<table class="preview-table"><thead>';
                if (rows.length > 0) {
                    tableHTML += '<tr>';
                    rows[0].forEach(cell => {
                        tableHTML += `<th>${escapeHtml(cell || '')}</th>`;
                    });
                    tableHTML += '</tr></thead><tbody>';

                    rows.slice(1).forEach(row => {
                        tableHTML += '<tr>';
                        row.forEach(cell => {
                            tableHTML += `<td>${escapeHtml(cell || '')}</td>`;
                        });
                        tableHTML += '</tr>';
                    });
                }
                tableHTML += '</tbody></table>';

                card.innerHTML = `
                    <input type="checkbox" class="select-checkbox" data-table-id="${table.id}">
                    <div class="table-header">
                        <div class="table-title">${escapeHtml(table.name)}</div>
                        <div class="table-badge">
                            <div class="badge">${rowCount} rows</div>
                            <div class="badge">${colCount} cols</div>
                        </div>
                    </div>
                    <div class="table-preview">${tableHTML}</div>
                `;

                const checkbox = card.querySelector('.select-checkbox');
                checkbox.addEventListener('change', () => {
                    toggleTableSelection(table.id, card, checkbox.checked);
                });

                card.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        checkbox.checked = !checkbox.checked;
                        checkbox.dispatchEvent(new Event('change'));
                    }
                });

                tablesGrid.appendChild(card);
            });

            tableCount.textContent = `${detectedTables.length} table${detectedTables.length !== 1 ? 's' : ''} detected`;
            resultsContainer.classList.add('show');
        }

        function toggleTableSelection(tableId, card, isSelected) {
            if (isSelected) {
                selectedTables.add(tableId);
                card.classList.add('selected');
            } else {
                selectedTables.delete(tableId);
                card.classList.remove('selected');
            }

            if (selectedTables.size > 0) {
                exportContainer.classList.add('show');
            } else {
                exportContainer.classList.remove('show');
            }
        }

        exportButton.addEventListener('click', () => {
            if (selectedTables.size === 0) {
                showError('Please select at least one table to export');
                return;
            }

            const selectedTableData = detectedTables.filter(t => selectedTables.has(t.id));
            
            if (selectedTableData.length === 1) {
                exportSingleTable(selectedTableData[0]);
            } else {
                exportMultipleTables(selectedTableData);
            }
        });

        function exportSingleTable(table) {
            try {
                const ws = XLSX.utils.aoa_to_sheet(table.data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, table.name);
                XLSX.writeFile(wb, `${table.name}.xlsx`);
                showSuccess(`✓ Exported ${table.name}`);
            } catch (err) {
                showError('Failed to export table');
                console.error(err);
            }
        }

        function exportMultipleTables(tables) {
            try {
                const wb = XLSX.utils.book_new();
                tables.forEach(table => {
                    const ws = XLSX.utils.aoa_to_sheet(table.data);
                    XLSX.utils.book_append_sheet(wb, ws, table.name.slice(0, 31)); // Sheet name limit
                });
                XLSX.writeFile(wb, 'TableScan_Export.xlsx');
                showSuccess(`✓ Exported ${tables.length} tables`);
            } catch (err) {
                showError('Failed to export tables');
                console.error(err);
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
